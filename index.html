<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>精听 LMS</title>
    <link rel="stylesheet" href="./styles.css?v=20260530-lms-2" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./supabase-config.js?v=20260530-lms-2"></script>
    <script defer src="./app.js?v=20260530-lms-2"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>精听 LMS</h1>
        <p id="appStatus">登录后进入作业</p>
      </div>
      <div class="top-actions">
        <span id="userBadge" class="status-pill is-hidden">未登录</span>
        <button class="ghost-button is-hidden" id="signOutButton" type="button">退出</button>
      </div>
    </header>

    <section id="authView" class="auth-shell">
      <div class="auth-card">
        <div>
          <p id="configStatus" class="status-pill">检查 Supabase 配置</p>
          <h2>登录精听作业</h2>
          <p class="muted">学生和老师分别登录，进入后只显示对应工作区。</p>
        </div>

        <div class="auth-mode-toggle" role="tablist" aria-label="登录身份">
          <button class="auth-mode-button is-active" id="studentModeButton" type="button" data-auth-mode="student">学生登录</button>
          <button class="auth-mode-button" id="teacherModeButton" type="button" data-auth-mode="teacher">老师登录</button>
        </div>

        <div class="auth-mode-panel" id="studentAuthPanel">
          <label>
            学生姓名
            <input id="fullNameInput" autocomplete="name" placeholder="输入同一个姓名会进入同一个账户" />
          </label>
          <button class="secondary-button" id="signUpButton" type="button">进入学生端</button>
        </div>

        <div class="auth-mode-panel is-hidden" id="teacherAuthPanel">
          <label>
            老师账号
            <select id="teacherEmailSelect">
              <option value="chensijruth@gmail.com">老师 1 · chensijruth@gmail.com</option>
              <option value="terrywai7114@gmail.com">老师 2 · terrywai7114@gmail.com</option>
            </select>
          </label>
          <label>
            老师密码
            <input id="passwordInput" autocomplete="current-password" type="password" placeholder="至少 6 位" />
          </label>
          <button class="primary-button" id="signInButton" type="button">老师登录</button>
        </div>
        <p id="authStatus" class="course-status">等待登录</p>
      </div>
    </section>

    <main id="appView" class="workspace is-hidden">
      <section class="panel asset-panel" id="studentTasksPanel" aria-labelledby="tasksTitle">
        <div class="panel-heading">
          <h2 id="tasksTitle">我的任务</h2>
          <span id="assignmentCount" class="status-pill">0 个</span>
        </div>
        <div id="assignmentList" class="assignment-list" aria-live="polite"></div>
      </section>

      <section class="panel listen-panel" id="practicePanel" aria-labelledby="listenTitle">
        <div class="panel-heading compact-heading">
          <div>
            <h2 id="listenTitle">作业精听</h2>
            <span id="lessonMeta" class="muted">请选择任务</span>
          </div>
          <div class="focus-meta">
            <span id="segmentCounter" class="muted">0 / 0</span>
            <span id="syncStatus" class="status-pill">未同步</span>
          </div>
        </div>

        <div class="wave-shell">
          <canvas id="waveform" height="144" aria-label="音频进度"></canvas>
          <audio id="audio" preload="metadata"></audio>
        </div>

        <div class="transport">
          <button class="icon-button" id="previousSegment" type="button" title="上一句" aria-label="上一句">‹</button>
          <button class="icon-button" id="replaySegment" type="button" title="重听本句" aria-label="重听本句">↺</button>
          <button class="play-button" id="togglePlay" type="button" title="播放/暂停" aria-label="播放/暂停">▶</button>
          <button class="icon-button" id="nextSegment" type="button" title="下一句" aria-label="下一句">›</button>

          <label class="select-label" for="playbackRate">速度</label>
          <select id="playbackRate">
            <option value="0.75">0.75x</option>
            <option value="0.9">0.9x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.15">1.15x</option>
            <option value="1.3">1.3x</option>
          </select>
        </div>

        <article class="focus-box">
          <div class="focus-meta">
            <span id="timeRange">--:-- - --:--</span>
            <span id="sentenceStatus" class="sentence-status">待开始</span>
            <span id="listenCountBadge" class="status-pill">听 0/3</span>
            <span id="scoreBadge" class="score-badge">未作答</span>
          </div>
          <div id="answerText" class="answer-text"></div>
          <textarea id="dictationInput" rows="5" spellcheck="false" placeholder="输入听到的内容"></textarea>
          <div class="inline-actions">
            <button class="secondary-button" id="checkAnswer" type="button">提交答案</button>
            <button class="ghost-button" id="copySegment" type="button" disabled>复制本句</button>
          </div>
        </article>
        <div id="audioStatus" class="course-status">请选择一个作业开始</div>
      </section>

      <section class="panel side-panel" id="progressPanel" aria-labelledby="progressTitle">
        <div class="panel-heading">
          <h2 id="progressTitle">进度</h2>
          <span id="progressText" class="muted">0%</span>
        </div>
        <div id="progressSummary" class="summary-grid"></div>
        <div class="notes-box">
          <div class="panel-heading small-heading">
            <h2>学习记录</h2>
          </div>
          <textarea id="notesInput" rows="6" placeholder="错因、连读、弱读、专有名词"></textarea>
        </div>
      </section>

      <section class="panel teacher-panel is-hidden" id="teacherPanel" aria-labelledby="teacherTitle">
        <div class="panel-heading">
          <h2 id="teacherTitle">老师工作台</h2>
          <span id="teacherStatus" class="status-pill">等待数据</span>
        </div>

        <div class="teacher-grid">
          <section class="teacher-card">
            <h3>分配任务</h3>
            <label>
              学生
              <select id="studentSelect"></select>
            </label>
            <label>
              课包
              <select id="teacherLessonSelect"></select>
            </label>
            <label>
              截止时间
              <input id="dueAtInput" type="datetime-local" />
            </label>
            <label>
              备注
              <textarea id="assignmentNote" rows="3" placeholder="可选"></textarea>
            </label>
            <button class="primary-button" id="assignTaskButton" type="button">分配任务</button>
          </section>

          <section class="teacher-card">
            <h3>学生</h3>
            <div id="studentsList" class="compact-list"></div>
          </section>
        </div>

        <section class="teacher-card">
          <div class="panel-heading small-heading">
            <h3>任务与完成情况</h3>
            <button class="ghost-button small-button" id="refreshTeacherData" type="button">刷新</button>
          </div>
          <div id="teacherAssignments" class="table-shell"></div>
        </section>

        <section class="teacher-card">
          <h3>句子明细</h3>
          <div id="teacherProgress" class="table-shell"></div>
        </section>
      </section>
    </main>
  </body>
</html>
